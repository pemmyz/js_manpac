<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostMan 3D: Arcade Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <!-- Import Three.js as a Module -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="game-container">
        <!-- HUD / UI Layer -->
        <div id="ui-layer">
            
            <!-- Gamepad Connection Toasts -->
            <div id="gamepad-notify"></div>

            <!-- Score HUD -->
            <div class="score-board">
                <div id="p1-score-box">
                    <div class="label">1UP</div>
                    <div id="score-p1">00</div>
                    <div id="lives-p1" class="lives"></div>
                </div>
                <div id="high-score-box">
                    <div class="label">HIGH SCORE</div>
                    <div id="high-score">10000</div>
                </div>
                <div id="p2-score-box">
                    <div class="label">2UP</div>
                    <div id="score-p2">00</div>
                    <div id="lives-p2" class="lives"></div>
                </div>
            </div>
            
            <!-- Main Menu / Message Center -->
            <div id="center-message">
                <h1 id="main-title">GhostMan 3D</h1>
                
                <p id="sub-message">MAP: ORIGINAL (SPACE TO START)</p>
                
                <!-- New Demo Countdown Element -->
                <div id="demo-countdown" class="hidden">DEMO IN 4</div>

                <div id="mode-select">
                    <button id="btn-1p" class="selected">1 PLAYER</button>
                    <button id="btn-2p">2 PLAYERS</button>
                    <div class="controls-hint">
                        <span>P1: ARROWS</span> • <span>P2: WASD</span> • <span>SPACE: START</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 3D Rendering Canvas -->
        <canvas id="game-canvas"></canvas>
    </div>

    <!-- Main Logic -->
    <script type="module" src="script.js"></script>
</body>
</html>
